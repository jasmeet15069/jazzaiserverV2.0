<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JAZZ AI — Production Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
tailwind.config={theme:{extend:{colors:{j:{bg:'#07070f',s:'#0c0c1a',s2:'#111124',b:'#1a1a30',b2:'#252540',a:'#7c6ff7',ah:'#6358e8',t:'#e4e4f4',m:'#9090b0',ok:'#34d399',err:'#f87171',warn:'#fbbf24'}},fontFamily:{sans:['Outfit','sans-serif'],mono:['DM Mono','monospace'],head:['Syne','sans-serif']}}}}
</script>
<style>
/* ══════════════════════════════════════════════
   CSS VARIABLES — Dark Mode (default)
   ══════════════════════════════════════════════ */
:root {
  --bg:        #07070f;
  --s:         #0c0c1a;
  --s2:        #111124;
  --b:         #1a1a30;
  --b2:        #252540;
  --b3:        #3a3a60;
  --accent:    #7c6ff7;
  --accent-h:  #6358e8;
  --accent-s:  #9d93fa;
  --text:      #e4e4f4;
  --muted:     #9090b0;
  --dim:       #4a4a6a;
  --dim2:      #2a2a48;
  --ok:        #34d399;
  --err:       #f87171;
  --warn:      #fbbf24;
  --info:      #60a5fa;
  --shadow:    rgba(0,0,0,.6);
  --shadow-sm: rgba(0,0,0,.3);
  --grad:      linear-gradient(135deg,#7c6ff7,#4338ca);
  --hljs-link: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css;
  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 14px;
}

/* ── Light Mode overrides ── */
body.light {
  --bg:        #f0f2f8;
  --s:         #ffffff;
  --s2:        #f5f6fb;
  --b:         #dde0ee;
  --b2:        #c8ccde;
  --b3:        #b0b5cc;
  --accent:    #5b4fe8;
  --accent-h:  #4a3fd6;
  --accent-s:  #7c6ff7;
  --text:      #1a1a2e;
  --muted:     #555575;
  --dim:       #8888aa;
  --dim2:      #cccedb;
  --shadow:    rgba(0,0,0,.12);
  --shadow-sm: rgba(0,0,0,.06);
  --grad:      linear-gradient(135deg,#5b4fe8,#7c6ff7);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;transition:background .25s,color .25s;-webkit-text-size-adjust:100%;overscroll-behavior:none}

/* Highlight.js theme swap */
body.light #hljs-theme{display:none}
body:not(.light) #hljs-theme-light{display:none}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--b3)}

/* ── Layout ── */
#app{display:flex;height:100dvh;min-height:100dvh}
.sidebar{width:248px;min-width:248px;background:#0c0c1a;border-right:1px solid #1a1a30;display:flex;flex-direction:column;height:100dvh;transition:transform .25s ease;z-index:50}
.sidebar-middle{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;height:100dvh;min-width:0}

/* ── Messages ── */
.msg-user{background:#131328;border:1px solid #1a1a30;border-radius:14px 14px 4px 14px;padding:10px 14px;max-width:78%;font-size:14px;line-height:1.6;word-break:break-word;overflow-wrap:anywhere;white-space:pre-wrap}
.msg-user details{white-space:normal}
.msg-user summary{cursor:pointer;color:#c7c7e8;font-weight:700;list-style:none}
.msg-user summary::-webkit-details-marker{display:none}
.msg-user pre{white-space:pre-wrap;overflow:auto;max-height:42svh;margin:8px 0 0;font-family:'DM Mono',monospace;font-size:12px;line-height:1.55;color:#e4e4f4}
.msg-user.long-input{max-width:min(860px,88%);width:auto}
.msg-user img{max-width:100%;border-radius:8px;margin-top:6px;border:1px solid #1a1a30;display:block}
.msg-ai{font-size:14px;line-height:1.7;max-width:100%;word-break:break-word}
.msg-ai pre{background:#0c0c1a;border:1px solid #1a1a30;border-radius:8px;overflow-x:auto;margin:10px 0;position:relative}
.msg-ai pre code{font-family:'DM Mono',monospace;font-size:12.5px;padding:16px;display:block}
.msg-ai code:not(pre code){background:#131328;border:1px solid #1a1a30;padding:2px 6px;border-radius:4px;font-size:12.5px;font-family:'DM Mono',monospace}
.msg-ai p{margin-bottom:8px}.msg-ai ul,.msg-ai ol{padding-left:20px;margin-bottom:8px}
.msg-ai li{margin-bottom:3px}
.msg-ai table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px;overflow-x:auto;display:block}
.msg-ai th,.msg-ai td{border:1px solid #1a1a30;padding:6px 10px;text-align:left}
.msg-ai th{background:#111124}
.msg-ai blockquote{border-left:2px solid #7c6ff7;padding-left:12px;color:#9090b0;margin:8px 0}
.msg-ai h1,.msg-ai h2,.msg-ai h3{font-family:'Syne',sans-serif;margin:12px 0 6px;font-weight:600}
.msg-empty{display:inline-flex;align-items:center;gap:8px;background:#1f0a0a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:9px 12px;font-size:13px}
.msg-tool{background:#0a0f1a;border:1px solid #1e3a5f;border-radius:10px;padding:10px 14px;font-size:13px;margin:4px 0}
.msg-tool .tool-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:#60a5fa;font-family:'DM Mono',monospace}
.copy-btn{position:absolute;top:8px;right:8px;background:#252540;border:none;color:#9090b0;cursor:pointer;padding:4px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace;transition:.2s}
.copy-btn:hover{background:#7c6ff7;color:#fff}

/* ── Nav ── */
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:500;color:#9090b0;transition:.15s;text-decoration:none;white-space:nowrap;position:relative}
.nav-item:hover{background:#111124;color:#e4e4f4}
.nav-item.active{background:#111124;color:#7c6ff7}
.nav-item .icon{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.nav-badge{background:#f87171;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;position:absolute;right:10px;top:50%;transform:translateY(-50%)}
.sidebar-new-chat{width:100%;border:1px solid #252540;background:#111124;color:#e4e4f4;margin-bottom:8px;justify-content:flex-start}
.sidebar-new-chat:hover{border-color:#7c6ff7;color:#fff}

/* ── Session list ── */
.session-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12.5px;color:#9090b0;transition:.15s;position:relative}
.session-item:hover{background:#111124;color:#e4e4f4}
.session-item.active{background:#111124;color:#e4e4f4}
.sess-actions{display:flex;gap:4px;opacity:0;transition:.15s}
.session-item:hover .sess-actions{opacity:1}

/* ── Buttons ── */
.btn{padding:8px 16px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:.2s;font-family:'Outfit',sans-serif;display:inline-flex;align-items:center;gap:6px;min-height:34px}
.btn-primary{background:#7c6ff7;color:#fff}.btn-primary:hover{background:#6358e8}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:#9090b0;border:1px solid #1a1a30}.btn-ghost:hover{background:#111124;color:#e4e4f4}
.btn-danger{background:transparent;color:#f87171;border:1px solid #f87171}.btn-danger:hover{background:#f87171;color:#fff}
.btn-success{background:transparent;color:#34d399;border:1px solid #34d399}.btn-success:hover{background:#34d399;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}

/* ── Inputs ── */
.input{width:100%;background:#0c0c1a;border:1px solid #1a1a30;color:#e4e4f4;padding:9px 12px;border-radius:8px;font-size:13.5px;font-family:'Outfit',sans-serif;outline:none;transition:.2s}
.input:focus{border-color:#7c6ff7}
.input::placeholder{color:#4a4a6a}
textarea.input{resize:vertical;min-height:80px;line-height:1.5}
select.input{cursor:pointer;appearance:none}

/* ── Cards / Badges ── */
.card{background:#0c0c1a;border:1px solid #1a1a30;border-radius:12px;padding:16px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.badge-free{background:#1a1a30;color:#9090b0}
.badge-pro{background:#1e1b4b;color:#818cf8}
.badge-enterprise{background:#1c1407;color:#fbbf24}
.badge-ok{background:#064e3b;color:#34d399}
.badge-err{background:#450a0a;color:#f87171}
.badge-warn{background:#431407;color:#fbbf24}
.badge-info{background:#1e3a5f;color:#60a5fa}
.badge-tool{background:#1e0a3c;color:#c084fc}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#0c0c1a;border:1px solid #252540;border-radius:16px;padding:24px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 32px 64px rgba(0,0,0,.6)}

/* ── Tabs ── */
.tab{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:#9090b0;transition:.15s;white-space:nowrap}
.tab.active{background:#111124;color:#7c6ff7}
.tab:hover:not(.active){color:#e4e4f4}

/* ── Animations ── */
.cursor-blink::after{content:'▋';animation:blink 1s infinite;color:#7c6ff7}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.typing-dot{width:6px;height:6px;background:#7c6ff7;border-radius:50%;animation:bounce .8s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.progress-bar{height:4px;background:#1a1a30;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#7c6ff7;border-radius:2px;transition:width .3s}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Voice button ── */
.voice-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #1a1a30;background:#0c0c1a;cursor:pointer;transition:.2s;color:#9090b0;font-size:13px;flex-shrink:0}
.voice-btn:hover{background:#111124;color:#7c6ff7;border-color:#7c6ff7}
.voice-btn.recording{background:#f87171;border-color:#f87171;color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}70%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}

/* ── Connector card ── */
.conn-card{background:#0c0c1a;border:1px solid #1a1a30;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:.2s;position:relative;overflow:hidden}
.conn-card:hover{border-color:#252540;background:#0f0f1e}
.conn-card.connected{border-color:#064e3b}
.conn-card .conn-icon{font-size:28px;line-height:1}
.connector-icon-img{object-fit:contain;display:inline-block;vertical-align:-.2em;flex-shrink:0}
.conn-card .conn-name{font-weight:700;font-size:14px;font-family:'Syne',sans-serif}
.conn-card .conn-desc{font-size:12px;color:#4a4a6a;line-height:1.4}
.conn-card .conn-status{display:flex;align-items:center;gap:6px;font-size:11px}
.conn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.conn-dot.connected{background:#34d399;box-shadow:0 0 6px #34d399}
.conn-dot.disconnected{background:#4a4a6a}
.conn-actions{display:flex;gap:6px;margin-top:auto}

/* ── Model pill ── */
.model-pill{display:inline-flex;align-items:center;gap:6px;background:#0d0d20;border:1px solid #1a1a30;border-radius:20px;padding:4px 10px 4px 8px;cursor:pointer;transition:.15s;font-size:12px;color:#9090b0;position:relative;user-select:none}
.model-pill:hover{border-color:#7c6ff7;color:#e4e4f4}
.model-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.model-dropdown{position:relative;width:100%;max-height:min(320px,45svh);overflow-y:auto;background:#0d0d20;border:1px solid #1a1a30;border-radius:12px;z-index:300;box-shadow:0 12px 40px rgba(0,0,0,.7)}
.model-opt{padding:9px 12px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:8px;font-size:13px}
.model-opt:hover{background:#111124}
.model-opt.selected{background:#111124;color:#7c6ff7}

/* ── Token bar ── */
.token-bar{display:flex;align-items:center;gap:10px;font-size:11px;color:#4a4a6a;font-family:'DM Mono',monospace;padding:2px 0;flex-wrap:wrap}
.tok-stat{display:flex;align-items:center;gap:3px}
.tok-label{color:#4a4a6a}
.tok-val{color:#9090b0}
.tok-ctx-bar{flex:1;height:3px;background:#1a1a30;border-radius:2px;overflow:hidden;min-width:60px}
.tok-ctx-fill{height:100%;border-radius:2px;transition:width .4s}
.context-chip{display:inline-flex;align-items:center;gap:7px;background:#0d0d20;border:1px solid #1a1a30;border-radius:999px;padding:5px 9px;color:#9090b0;font-size:12px;cursor:pointer;position:relative;flex-shrink:0}
.context-chip:hover{border-color:#7c6ff7;color:#e4e4f4}
.context-ring{--pct:0;display:inline-block;width:16px;height:16px;border-radius:50%;background:conic-gradient(#7c6ff7 calc(var(--pct)*1%),#252540 0);position:relative;flex-shrink:0}
.context-ring::after{content:"";position:absolute;inset:3px;background:#07070f;border-radius:50%}
.context-popover{position:relative;z-index:450;width:min(272px,calc(100vw - 24px));background:#fbfbfd;color:#1d1d27;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 18px 60px rgba(0,0,0,.45);padding:14px 16px;text-align:center;font-family:'Outfit',system-ui,sans-serif}
.context-popover .muted{color:#8b8b98}
.context-popover .big{font-size:18px;font-weight:600;margin-top:6px}
.context-popover .tokens{font-size:16px;margin-top:8px}
.context-popover .strong{font-weight:800;margin-top:16px;line-height:1.35}
.context-popover .mini{font-size:11px;color:#6b7280;margin-top:8px;line-height:1.45}
.context-popover .context-actions{display:flex;justify-content:center;gap:8px;margin-top:12px}

/* ── Queue ── */
#queue-panel{background:#0a0a16;border-top:1px solid #1a1a30;padding:6px 14px 8px;display:none}
.queue-item{display:flex;align-items:center;gap:8px;padding:5px 8px;background:#111124;border-radius:6px;margin-bottom:4px;font-size:12px;color:#9090b0}
.queue-item .q-preview{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.queue-item .q-rm{cursor:pointer;color:#4a4a6a;font-size:11px;flex-shrink:0;padding:2px 4px;border-radius:3px;border:none;background:transparent}
.queue-item .q-rm:hover{color:#f87171;background:#1a0505}

/* ── Slash palette ── */
#slash-palette{position:absolute;bottom:100%;left:0;right:0;background:#0d0d20;border:1px solid #1a1a30;border-radius:10px 10px 0 0;padding:6px;z-index:50;max-height:200px;overflow-y:auto;display:none}
.slash-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:.12s}
.slash-item:hover,.slash-item.active{background:#111124}
.slash-item .si-cmd{font-family:'DM Mono',monospace;font-size:12px;color:#7c6ff7;min-width:90px}
.slash-item .si-app{font-size:11px;color:#4a4a6a}
.slash-item .si-desc{font-size:12px;color:#9090b0}

/* ── Agent steps ── */
.agent-step{border-left:2px solid #1a1a30;padding:8px 12px;margin:4px 0;border-radius:0 6px 6px 0;font-size:13px}
.agent-step.thought{border-color:#7c6ff7;background:#0d0b1e}
.agent-step.tool{border-color:#60a5fa;background:#0a0f1a}
.agent-step.result{border-color:#34d399;background:#031510}
.agent-step.done{border-color:#fbbf24;background:#110d02}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#e4e4f4}
.log-line{font-family:'DM Mono',monospace;font-size:11.5px;padding:2px 0;border-bottom:1px solid #0c0c1a;line-height:1.5}

/* ── Notif ── */
.notif-dot{width:7px;height:7px;background:#f87171;border-radius:50%;position:absolute;top:3px;right:3px}
.notif-panel{position:fixed;top:56px;right:12px;width:320px;max-height:420px;background:#0c0c1a;border:1px solid #1a1a30;border-radius:12px;z-index:400;padding:12px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6);overflow-y:auto}
.notif-panel.show{display:block}
.notif-item{padding:8px;border-bottom:1px solid #1a1a30;font-size:12px}
.notif-item:last-child{border-bottom:none}
.notif-item b{display:block;margin-bottom:2px;color:#e2e2e8}
.notif-empty{text-align:center;color:#4a4a6a;padding:16px;font-size:12px}

/* ── Img preview ── */
#img-preview-bar{display:none;padding:6px 0 2px;position:relative}
#img-preview-bar img{height:56px;width:56px;object-fit:cover;border-radius:8px;border:1px solid #1a1a30}
.remove-img{position:absolute;top:2px;left:44px;width:18px;height:18px;border-radius:50%;background:#f87171;border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}

/* ── WS status ── */
#ws-indicator{width:7px;height:7px;border-radius:50%;background:#4a4a6a;flex-shrink:0;transition:background .3s}
#ws-indicator.online{background:#34d399;box-shadow:0 0 6px #34d399}
#ws-indicator.offline{background:#f87171}

/* ── Mobile ── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:49;backdrop-filter:blur(2px)}
@supports (height:100svh){
  #app,.main,.sidebar,.chat-shell{height:100svh;min-height:100svh}
}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:min(86vw,320px);min-width:0;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.5);padding-top:env(safe-area-inset-top)}
  .sidebar.open{transform:translateX(0)}
  #sidebar-overlay.visible{display:block}
  #hamburger{display:flex !important;width:40px;height:40px;align-items:center;justify-content:center}
  .main{width:100%;min-width:0}
  .msg-user{max-width:92%;font-size:14px}
  .msg-ai{font-size:14px}
  #chat-input{font-size:16px}
  .modal{width:100%;border-radius:12px 12px 0 0;padding:16px;max-height:calc(100svh - env(safe-area-inset-top) - 12px)}
  .modal-bg{padding:8px 8px max(8px,env(safe-area-inset-bottom));align-items:flex-end}
  .workspace-header{padding:12px 14px;padding-top:max(12px,env(safe-area-inset-top));gap:10px}
  .workspace-header .page-title{font-size:15px}
  .chat-header{padding:8px 10px !important;padding-top:max(8px,env(safe-area-inset-top)) !important;gap:6px !important;flex-wrap:wrap}
  .chat-title-wrap{flex:1 1 calc(100% - 52px) !important;min-width:0}
  .chat-toggle{font-size:11px !important;background:#0c0c1a;border:1px solid #1a1a30;border-radius:999px;padding:5px 8px}
  #messages{padding:12px !important;gap:12px !important}
  #queue-panel{padding:6px 10px 8px}
  .chat-composer-wrap{padding:8px 10px !important;padding-bottom:max(10px,env(safe-area-inset-bottom)) !important}
  #composer-box{border-radius:12px !important;padding:9px !important}
  .composer-actions{align-items:stretch !important;gap:8px !important;flex-direction:column}

const DEFAULT_API_BASE = 'https://imperceptibly-hymnlike-leesa.ngrok-free.dev';
let API = (localStorage.getItem('jazz_api') || DEFAULT_API_BASE || window.location.origin).replace(/\/+$/, '');
let WS_URL = API.replace('https://', 'wss://').replace('http://', 'ws://');
let _apiResolved = false;

function isBlockedApiBase(base) {
  return false;
}

function apiFetch(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: { 'ngrok-skip-browser-warning': 'true', ...(opts.headers || {}) }
  });
}

if (isBlockedApiBase(API)) {
  localStorage.removeItem('jazz_api');
  API = (DEFAULT_API_BASE || window.location.origin || 'http://127.0.0.1:8000').replace(/\/+$/, '');
  WS_URL = API.replace('https://', 'wss://').replace('http://', 'ws://');
}

function setApiBase(base) {
  if (isBlockedApiBase(base)) return;
  API = (base || '').replace(/\/+$/, '');
  WS_URL = API.replace('https://', 'wss://').replace('http://', 'ws://');
}

async function probeApiBase(base) {
  if (!base) return false;
  const clean = base.replace(/\/+$/, '');
  const ctl = new AbortController();
  const tm = setTimeout(() => ctl.abort(), 3000);
  try {
    const hr = await apiFetch(clean + '/health', { method:'GET', signal: ctl.signal, cache:'no-store' });
    if (hr.ok) {
      const ct = (hr.headers.get('content-type') || '').toLowerCase();
      if (ct.includes('application/json')) {
        const d = await hr.json().catch(() => null);
        if (d && (d.status || d.version || Array.isArray(d.features))) return true;
      }
    }
    const r = await apiFetch(clean + '/auth/me', { method:'GET', signal: ctl.signal, cache:'no-store' });
    return [200, 401, 403].includes(r.status);
  } catch {
    return false;
  } finally {
    clearTimeout(tm);
  }
}

function apiBaseCandidatesForLocation() {
  const out = [];
  const add = v => {
    const b = (v || '').trim().replace(/\/+$/, '');
    if (b && !out.includes(b)) out.push(b);
  };
  try {
    const loc = window.location;
    if (!loc || !loc.hostname || loc.origin === 'null') return out;
    const proto = loc.protocol === 'https:' ? 'https:' : 'http:';
    const host = loc.hostname;
    const currentPort = loc.port || (proto === 'https:' ? '443' : '80');
    if (currentPort !== '8000') add(`${proto}//${host}:8000`);
    if (currentPort !== '8080') add(`${proto}//${host}:8080`);
    add(`${proto}//${host}`);
  } catch(e) {}
  return out;
}

async function resolveApiBase(force = false) {
  if (_apiResolved && !force) return API;
  const candidates = [];
  const push = v => {
    const b = (v || '').trim().replace(/\/+$/, '');
    if (isBlockedApiBase(b)) return;
    if (b && !candidates.includes(b)) candidates.push(b);
  };
  push(localStorage.getItem('jazz_api'));
  push(API);
  push(DEFAULT_API_BASE);
  apiBaseCandidatesForLocation().forEach(push);
  push('http://localhost:8000');
  push('http://127.0.0.1:8000');
  if (window.location && window.location.origin && window.location.origin !== 'null') push(window.location.origin);

  for (const c of candidates) {
    if (await probeApiBase(c)) {
      setApiBase(c);
      localStorage.setItem('jazz_api', API);
      _apiResolved = true;
      return API;
    }
  }
  _apiResolved = true;
  return API;
}

async function req(method, path, body, isForm) {
  await resolveApiBase();
  const opts = { method, headers: {} };
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token;
  if (body && !isForm) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  if (isForm) opts.body = body;
  let r = await apiFetch(API + path, opts);
  if ([404, 405, 501].includes(r.status) && !path.startsWith('/auth/refresh')) {
    await resolveApiBase(true);
    r = await apiFetch(API + path, opts);
  }
  if (r.status === 401 && S.refresh) {
    const rr = await apiFetch(API + '/auth/refresh', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ refresh_token: S.refresh }) });
    if (rr.ok) {
      const d = await rr.json();
      S.token = d.access_token; S.refresh = d.refresh_token; save();
      opts.headers['Authorization'] = 'Bearer ' + S.token;
      r = await apiFetch(API + path, opts);
    } else { doLogout(); throw new Error('Session expired'); }
  }
  if (!r.ok) {
    const e = await r.json().catch(() => ({ detail: r.statusText }));
    const err = new Error(errText(e.detail || e.message || e || 'Error'));
    err.status = r.status;
    throw err;
  }
  if (r.status === 204) return null;
  return r.json();
}
const get   = p       => req('GET',    p);
const post  = (p, b)  => req('POST',   p, b);
const put   = (p, b)  => req('PUT',    p, b);
const del   = p       => req('DELETE', p);
const patch = (p, b)  => req('PATCH',  p, b);

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function errText(value) {
  if (value == null) return 'Error';
  if (typeof value === 'string') return value;
  if (value instanceof Error) return value.message || 'Error';
  if (Array.isArray(value)) return value.map(errText).filter(Boolean).join('; ');
  if (typeof value === 'object') {
    if (value.detail !== undefined) return errText(value.detail);
    if (value.msg !== undefined) return errText(value.msg);
    if (value.message !== undefined) return errText(value.message);
    try { return JSON.stringify(value); } catch(e) { return String(value); }
  }
  return String(value);
}
function toast(msg, type = 'info') {
  const c = { ok:'#064e3b', err:'#450a0a', info:'#1e3a5f', warn:'#431407' };
  const bc = { ok:'#34d399', err:'#f87171', info:'#60a5fa', warn:'#fbbf24' };
  const t = document.createElement('div');
  t.style.cssText = `background:${c[type]||c.info};border:1px solid ${bc[type]||bc.info};color:${bc[type]||bc.info};padding:10px 14px;border-radius:10px;font-size:13px;max-width:360px;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:fadeIn .2s ease`;
  t.textContent = errText(msg);
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw = document.getElementById('auth-password').value;
  const name = document.getElementById('auth-name').value.trim();
  const errEl = document.getElementById('auth-error');
  if (!email || !pw) { errEl.textContent = 'Email and password required'; errEl.style.display = 'block'; return; }
  const btn = document.querySelector('#login-page .btn-primary');
  btn.textContent = '…'; btn.disabled = true;
  try {
    await resolveApiBase();
    const body = authMode === 'signup' ? { email, password: pw, full_name: name||undefined } : { email, password: pw };
    let d;
    try {
      d = await post('/auth/' + (authMode==='signup' ? 'signup' : 'login'), body);
    } catch (e) {
      if (authMode === 'signup' && (e.status === 404 || e.status === 405 || /unsupported method|not found/i.test(e.message || ''))) {
        d = await post('/auth/register', body);
      } else {
        throw e;
      }
    }
    S.token = d.access_token; S.refresh = d.refresh_token; S.user = d.user; save();
    showApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
    btn.textContent = authMode==='login' ? 'Sign In' : 'Create Account'; btn.disabled = false;
  }
}
async function doLogout() {
  if (S.refresh) await post('/auth/logout', { refresh_token: S.refresh }).catch(() => {});
  S.token = null; S.refresh = null; S.user = null;
  ['jazz_token','jazz_refresh','jazz_user'].forEach(k => localStorage.removeItem(k));
  if (S.ws) S.ws.close();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

async function loadModels() {
  try {
    const d = await get('/model-info');
    const all = [];
    const inferCensored = m => {
      if (typeof m.censored === 'boolean') return m.censored;
      const s = `${m.id || ''} ${m.label || m.name || ''}`.toLowerCase();
      return !(s.includes('uncensored') || s.includes('dolphin'));
    };
    (d.builtin_models || []).forEach(m => all.push({ id:m.id, label:m.label, ctx:m.ctx||32768, censored:inferCensored(m), tags:[m.provider, m.protected?'protected':''].filter(Boolean) }));
    (d.db_models || []).forEach(m => all.push({ id:m.id, label:m.name||m.id, ctx:m.context_length||m.ctx||4096, censored:inferCensored(m), tags:[m.provider, ...(m.tags||[])].filter(Boolean), cost_per_million_tokens:m.cost_per_million_tokens }));
    const seen = new Set();
    const deduped = all.filter(m => !seen.has(m.id) && seen.add(m.id));
    if (deduped.length) { S.models = deduped; S.customModels = d.db_models || []; }
  } catch(e) {}
}

async function loadUsage() {
  try {
    const d = await get('/usage'); S.usage = d;
    const used = d.usage.messages_today, lim = d.limits.messages_per_day;
    if (lim > 0) {
      document.getElementById('usage-bar-wrap').style.display = 'block';
      document.getElementById('usage-text').textContent = used + '/' + lim;
      document.getElementById('usage-fill').style.width = Math.min(100, used/lim*100) + '%';
    }
  } catch(e) {}
}

async function loadConnectedApps() {
  try {
    const [smart, legacy] = await Promise.all([
      get('/smart-connectors').catch(() => ({ connectors: [] })),
      get('/connectors').catch(() => ({ connectors: [] })),
    ]);
    S.connectedApps = {};
    (smart.connectors || []).forEach(c => {
      const status = (c.status || '').toLowerCase();
      c.status = status === 'connected' ? 'active' : (status || 'active');
      S.connectedApps[c.connector_type] = c;
    });
    (legacy.connectors || []).forEach(c => {
      if (!S.connectedApps[c.connector_type] && c.is_active) {
        S.connectedApps[c.connector_type] = {
          id: c.id,
          app_name: c.name || c.connector_type,
          connector_type: c.connector_type,
          status: 'active',
          last_tested_at: c.last_tested_at,
          last_test_ok: c.last_test_ok,
          created_at: c.created_at,
          source: 'legacy_oauth',
        };
      }
    });
    const cnt = Object.keys(S.connectedApps).length;
    const badge = document.getElementById('conn-badge');
    if (badge) {
      if (cnt > 0) { badge.textContent = cnt; badge.style.display = ''; }
      else badge.style.display = 'none';
    }
    if (!S.selectedConnectorIds?.length && cnt > 0) S.selectedConnectorIds = Object.keys(S.connectedApps);
    updateToolsCount();
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════
function connectWS() {
  if (!S.token || !S.user) return;
  const ws = new WebSocket(WS_URL + '/ws/' + S.user.id);
  const ind = document.getElementById('ws-indicator');
  ws.onopen = () => {
    ws.send(JSON.stringify({ type:'auth', token: S.token }));
    S.wsRetry = 0;
    if (ind) { ind.className = ''; ind.id = 'ws-indicator'; ind.classList.add('online'); }
  };
  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    if (m.type === 'notification') {
      S.notifications.unshift({ id: Date.now() + Math.random(), title: m.title, message: m.message });
      document.getElementById('notif-dot').style.display = 'block';
    }
  };
  ws.onclose = () => {
    if (ind) { ind.className = ''; ind.id = 'ws-indicator'; ind.classList.add('offline'); }
    setTimeout(connectWS, Math.min(++S.wsRetry * 2000, 30000));
  };
  S.ws = ws;
  setInterval(() => { if (ws.readyState === 1) ws.send(JSON.stringify({ type:'ping' })); }, 30000);
}

function navigate(page, params = {}) {
  const prevPage = S.page;
  if (prevPage && prevPage !== page && !params._fromBack) {
    S.navStack.push(prevPage);
    if (S.navStack.length > 30) S.navStack.shift();
  }
  S.page = page; closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('session-list-wrap').style.display = page === 'chat' ? 'flex' : 'none';
  const pages = { chat, documents, memory, agents, playground, multimodel: multiModelPage, connectors, websites, code, livy, apikeys, settings, admin, mcp: mcpPage };
  const fn = pages[page];
  if (fn) Promise.resolve(fn(params)).then(injectPageBackButtons).then(renderThemeToggle).catch(e => console.error(e));
}
function goBackPage() {
  const target = S.navStack.pop() || 'chat';
  navigate(target, { _fromBack:true });
}
function injectPageBackButtons() {
  const header = document.querySelector('#main-content .workspace-header');
  if (!header || header.querySelector('.page-back-btn')) return;
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'page-back-btn';
  btn.title = 'Back';
  btn.setAttribute('aria-label', 'Back');
  btn.textContent = '‹';
  btn.onclick = goBackPage;
  const first = header.firstElementChild;
  if (first && first.tagName === 'DIV' && first.querySelector('.page-title') && !first.classList.contains('page-title')) {
    first.insertBefore(btn, first.firstChild);
  } else {
    header.insertBefore(btn, header.firstChild);
  }
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }

// ── Slash palette ──
let _slashPaletteIdx = 0;
function checkSlash(val) {
  const pal = document.getElementById('slash-palette');
  if (!pal) return;
  if (!val.startsWith('/') || val.includes(' ')) { pal.style.display = 'none'; return; }
  const q = val.slice(1).toLowerCase();
  const matches = SLASH_COMMANDS.filter(c => c.cmd.startsWith(q) || c.name.toLowerCase().startsWith(q)).slice(0, 8);
  if (!matches.length) { pal.style.display = 'none'; return; }
  _slashPaletteIdx = 0;
  pal.style.display = 'block';
  pal.innerHTML = matches.map((c, i) => `
    <div class="slash-item${i===0?' active':''}" data-cmd="/${c.cmd}" onclick="selectSlash('/${c.cmd}')">
      ${renderConnectorIcon(c, 16, 'slash-icon')}
      <span class="si-cmd">/${c.cmd}</span>
      <span class="si-desc">${c.desc.slice(0,50)}</span>
    </div>`).join('');
}
function selectSlash(cmd) {
  const inp = document.getElementById('chat-input');
  if (inp) { inp.value = cmd + ' '; inp.focus(); autoResize(inp); }

// ── Token bar ──
// Cost-per-million-tokens estimates (input, output) in USD
// Groq free-tier models are $0, HF/Ollama approximations included
const MODEL_COST_PER_M = {
  'llama-3.3-70b-versatile':       [0.59, 0.79],
  'llama-3.1-8b-instant':          [0.05, 0.08],
  'dolphin-3.0-llama-3.1-8b':      [0.00, 0.00],
  'dolphin-mistral-24b-venice-hf': [0.00, 0.00],
};
function _modelCostPerM(modelId) {
  if (!modelId) return null;
  if (MODEL_COST_PER_M[modelId]) return MODEL_COST_PER_M[modelId];
  // Check custom models from S.models list
  const m = (S.models || []).concat(S.customModels || []).find(x => x.id === modelId);
  if (m && m.cost_per_million_tokens) {
    const c = m.cost_per_million_tokens;
    return Array.isArray(c) ? c : [c, c];
  }
  return null;
}
function updateTokenBar(stats) {
  S.lastTokens = stats;
  if (stats && stats.context) updateContextMeter(stats.context);
  const bar = document.getElementById('token-bar');
  if (!bar) return;
  bar.style.display = 'flex';
  const $ = id => document.getElementById(id);
  if ($('tok-in'))    $('tok-in').textContent    = stats.input  || 0;
  if ($('tok-out'))   $('tok-out').textContent   = stats.output || 0;
  if ($('tok-total')) $('tok-total').textContent = (stats.input||0) + (stats.output||0);
  const pct = S.contextStatus ? Math.round(S.contextStatus.percent_used || 0) : Math.min(100, Math.round(((stats.input||0) / 6000) * 100));
  if ($('tok-ctx-fill')) { $('tok-ctx-fill').style.width = pct + '%'; $('tok-ctx-fill').style.background = pct > 80 ? '#f87171' : pct > 50 ? '#fbbf24' : '#7c6ff7'; }
  if ($('tok-ctx-pct')) $('tok-ctx-pct').textContent = pct + '% ctx';
  // Cost estimate
  const costEl = $('tok-cost');
  if (costEl) {
    const rates = _modelCostPerM(S.modelId);
    if (rates) {
      const inCost  = (stats.input  || 0) / 1_000_000 * rates[0];
      const outCost = (stats.output || 0) / 1_000_000 * rates[1];
      const total   = inCost + outCost;
      const fmt = total < 0.0001 ? '~$0' : total < 0.01 ? `~$${(total * 1000).toFixed(3)}m` : `~$${total.toFixed(4)}`;
      costEl.textContent = fmt;
      costEl.title = `Input: $${inCost.toFixed(5)} · Output: $${outCost.toFixed(5)} (per-message estimate)`;
      costEl.style.display = 'inline';
    } else {
      costEl.style.display = 'none';
    }
  }
}

function fmtTokens(n) {
  n = Number(n || 0);
  if (n >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1).replace(/\.0$/,'') + 'm';
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/,'') + 'k';
  return String(Math.round(n));
}
function updateContextMeter(ctx) {
  S.contextStatus = ctx || null;
  const pct = Math.max(0, Math.min(100, Math.round(Number(ctx?.percent_used || 0))));
  const ring = document.getElementById('context-ring');
  const mini = document.getElementById('context-mini');
  if (ring) {
    ring.style.setProperty('--pct', pct);
    ring.style.background = `conic-gradient(${pct >= 90 ? '#f87171' : pct >= 65 ? '#fbbf24' : '#7c6ff7'} ${pct}%, #252540 0)`;
  }
  if (mini) mini.textContent = pct + '%';
  const pop = document.getElementById('context-popover-wrap');
  if (pop && pop.style.display !== 'none') renderContextPopover();
}
async function loadContextStatus() {
  if (!S.activeSession) { updateContextMeter({ percent_used:0, used_tokens:0, context_limit_tokens:(S.models.find(m=>m.id===S.modelId)?.ctx||32768), percent_left:100 }); return; }
  try {
    const d = await get(`/sessions/${S.activeSession}/context?model_id=${encodeURIComponent(S.modelId)}`);
    updateContextMeter(d);
  } catch(e) {}
}
function renderContextPopover() {
  const pop = document.getElementById('context-popover-wrap');
  const btn = document.getElementById('context-window-btn');
  if (!pop || !btn) return;
  const ctx = S.contextStatus || {};
  const pct = Math.round(Number(ctx.percent_used || 0));
  const left = Math.max(0, Math.round(Number(ctx.percent_left ?? (100 - pct))));
  const used = fmtTokens(ctx.used_tokens || 0);
  const max = fmtTokens(ctx.context_limit_tokens || (S.models.find(m=>m.id===S.modelId)?.ctx||32768));
  const rect = btn.getBoundingClientRect();
  pop.style.display = 'block';
  pop.style.left = Math.min(window.innerWidth - 284, Math.max(12, rect.right - 272)) + 'px';
  pop.style.top = (rect.bottom + 8) + 'px';
  pop.innerHTML = `<div class="context-popover">
    <div class="muted">Context window:</div>
    <div class="big">${pct}% used (${left}% left)</div>
    <div class="tokens">${used} / ${max} tokens used</div>
    <div class="strong">JAZZ automatically<br>compacts its context</div>
    <div class="mini">${ctx.summary_count||0} summaries · ${ctx.hidden_messages||0} compacted messages · threshold ${ctx.auto_compact_threshold_percent||90}%</div>
    <div class="context-actions">
      <button class="btn btn-ghost btn-xs" onclick="loadContextStatus()">Refresh</button>
      <button class="btn btn-primary btn-xs" onclick="compactContextNow()">Compact now</button>
    </div>
  </div>`;
}
async function toggleContextPopover(e) {
  e?.stopPropagation();
  const pop = document.getElementById('context-popover-wrap');
  if (!pop) return;
  if (pop.style.display !== 'none') { pop.style.display = 'none'; document.removeEventListener('click', closeContextPopover); return; }
  await loadContextStatus();
  renderContextPopover();
  setTimeout(() => document.addEventListener('click', closeContextPopover), 0);
}
function closeContextPopover(e) {
  if (e && (e.target.closest?.('#context-popover-wrap') || e.target.closest?.('#context-window-btn'))) return;
  const pop = document.getElementById('context-popover-wrap');
  if (pop) pop.style.display = 'none';
  document.removeEventListener('click', closeContextPopover);
}
async function compactContextNow() {
  if (!S.activeSession) return;
  if (!confirm('Compact older messages into a rolling summary? Recent messages stay visible.')) return;
  try {
    const d = await post(`/sessions/${S.activeSession}/compact`, { model_id:S.modelId });
    updateContextMeter(d);
    await loadSession(S.activeSession);
    toast(d.compact_result === 'compacted' ? 'Context compacted' : 'Nothing to compact yet', 'ok');
  } catch(e) { toast(e.message, 'err'); }
}

function onChatSearchInput(value) {

        ${(!snippet && !meta) ? `<pre style="margin:6px 0 0;white-space:pre-wrap">${escHtml(JSON.stringify(r, null, 2))}</pre>` : ''}
      </div>`;
    }
    return `<pre style="margin:0">${escHtml(String(r))}</pre>`;
  }).join('');
  return `<div class="msg-tool"><div class="tool-header">⚙ ${escHtml(app)} result${hasError ? ' (error)' : ''}</div>${body}</div>`;
}
function renderAssistantContent(text) {
  if (!String(text ?? '').trim()) {
    return '<div class="msg-empty">No text arrived from the selected model. The router will try another model automatically on the next send.</div>';
  }
  const payload = tryParseToolPayload(text);
  if (payload) return renderToolPayload(payload);
  return renderMd(text);
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return String(s ?? '').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function renderConnectorIcon(c, size = 28, className = 'conn-icon') {

  }
  return `<span class="${escAttr(className)}" style="font-size:${px}px;line-height:1">${icon}</span>`;
}

function removeImage() { S.pendingImage = null; const bar = document.getElementById('img-preview-bar'); if (bar) bar.style.display = 'none'; }

function removeQueueItem(id) { S.chatQueue = S.chatQueue.filter(x => x.id !== id); renderQueuePanel(); }

function submitChat() {
  const inp = document.getElementById('chat-input');
  const msg = inp.value.trim(); if (!msg) return;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('slash-palette').style.display = 'none';
  const imgData = S.pendingImage || null;
  if (imgData) removeImage();
  if (S.streaming) {
    S.chatQueue.push({ id: 'q_'+Date.now()+'_'+Math.random().toString(36).slice(2), msg, imgData });
    renderQueuePanel(); toast(`Queued (#${S.chatQueue.length})`, 'info'); return;
  }
  _executeChat(msg, imgData);
}
function _executeChat(msg, imgData) { S.streaming = true; renderQueuePanel(); _sendChatInternal(msg, imgData); }
function _tryRunNextQueued() {
  if (!S.chatQueue.length) { S.streaming = false; renderQueuePanel(); return; }
  const next = S.chatQueue.shift(); renderQueuePanel(); _executeChat(next.msg, next.imgData);
}

async function _sendChatInternal(msg, imgData) {
  const msgsEl = document.getElementById('messages');
  if (!msgsEl) { S.streaming = false; _tryRunNextQueued(); return; }
  const empty = msgsEl.querySelector('div[style*="align-items:center"]');
  if (empty) msgsEl.innerHTML = '';

  const imgHtml = imgData ? `<img src="${imgData}" style="max-width:200px;max-height:160px;object-fit:contain;border-radius:8px;margin-top:6px;border:1px solid #1a1a30;display:block">` : '';
  msgsEl.insertAdjacentHTML('beforeend', `<div style="display:flex;justify-content:flex-end" class="fade-in">${renderUserContent(msg, imgHtml)}</div>`);

  const aiId = 'ai-' + Date.now();
  msgsEl.insertAdjacentHTML('beforeend', `<div class="fade-in" id="${aiId}"><div class="tool-timeline" id="${aiId}-tools"></div><div class="msg-ai cursor-blink" style="min-height:20px"></div></div>`);
  scrollBottom();
  document.getElementById('typing-ind').style.display = 'block';

  let full = '', displayText = '', thinkingContent = '';
  let liveToolEvents = [];
  let mode = 'normal';

  function _onDone(d) {
    S.streaming = false;
    document.getElementById('typing-ind').style.display = 'none';
    if (d?.model_id) {
      S.modelId = d.model_id;
      updateModelPill();
      loadContextStatus();
    }
    if (!full.trim() && d?.content) full = String(d.content);
    if (!full.trim()) full = 'I did not receive text from the selected model on that attempt. I will automatically try another model on the next send.';
    // Compute a human-readable copy text: for tool payloads, summarise instead of raw JSON
    const _tp = tryParseToolPayload(full);
    if (_tp) {
      const _res = _tp.result;
      const _items = Array.isArray(_res) ? _res : Array.isArray(_res?.results) ? _res.results : Array.isArray(_res?.messages) ? _res.messages : (_res ? [_res] : []);
      displayText = `[${_tp.app} / ${_tp.action}] ${_items.length} result(s)\n` +
        _items.slice(0,10).map((r,i) => r && typeof r==='object'
          ? `${i+1}. ${r.subject||r.title||r.name||r.id||JSON.stringify(r)}`
          : String(r)).join('\n');
    } else {
      displayText = full;
    }
    const bubble = document.querySelector(`#${aiId} .msg-ai`);
    if (bubble) { bubble.classList.remove('cursor-blink'); bubble.innerHTML = renderAssistantContent(full); }
    document.querySelector(`#${aiId}`)?.insertAdjacentHTML('beforeend', `
      <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:0 2px;margin-top:4px">
        <span style="font-size:10px;color:#4a4a6a;font-family:'DM Mono',monospace">${d.latency_ms||0}ms · ↑${d.tokens?.input||0} ↓${d.tokens?.output||0}</span>
        ${mode==='thinking'?'<span class="badge badge-tool" style="font-size:9px">🧠 thinking</span>':''}
        <button onclick="copyMsg(this)" data-text="${escAttr(displayText)}" class="btn btn-ghost btn-xs">copy</button>
      </div>`);
    addCopyBtns(); hljs.highlightAll(); scrollBottom();
    updateTokenBar({ input:d.tokens?.input||0, output:d.tokens?.output||0, context:d.context });
    if (!d.context) setTimeout(loadContextStatus, 300);
    loadSessions(); loadUsage(); renderQueuePanel(); _tryRunNextQueued();
  }
  function _onDelta(content) {
    full += content;
    const bubble = document.querySelector(`#${aiId} .msg-ai`);
    if (bubble) { bubble.innerHTML = renderAssistantContent(full); bubble.classList.add('cursor-blink'); }
    scrollBottom();
  }
  function _onThinking(content) {
    thinkingContent = content; mode = 'thinking';
    let block = document.querySelector(`#${aiId} .thinking-block`);
    if (!block) {
      document.querySelector(`#${aiId}`)?.insertAdjacentHTML('afterbegin', `<details class="thinking-block" open><summary>Reasoning…</summary><div id="${aiId}-think" style="white-space:pre-wrap;margin-top:8px;font-size:11px"></div></details>`);
      block = document.querySelector(`#${aiId} #${aiId}-think`);
    }
    if (block) block.textContent = content;
    scrollBottom();
  }
  function _onToolEvent(d) {
    if (d.type === 'model_switch' && d.selected && d.model_id) {
      S.modelId = d.model_id;
      updateModelPill();
      loadContextStatus();
    }
    liveToolEvents.push(d);
    const el = document.getElementById(`${aiId}-tools`);
    if (el) {
      const html = renderToolTimeline(liveToolEvents);
      el.innerHTML = html ? html.slice('<div class="tool-timeline">'.length, -6) : '';
    }
    scrollBottom();
  }
  function _onError(errMsg) {
    S.streaming = false;
    document.getElementById('typing-ind').style.display = 'none';
    const msg = errText(errMsg);
    const bubble = document.querySelector(`#${aiId} .msg-ai`);
    if (bubble) { bubble.classList.remove('cursor-blink'); bubble.innerHTML = `<span style="color:#f87171">⚠️ ${escHtml(msg)}</span>`; }
    toast(msg || 'Stream error', 'err');
    renderQueuePanel(); _tryRunNextQueued();
  }

  async function _tryEventSource() {
    return new Promise(resolve => {
      const toolOptions = selectedToolOptions();
      const params = new URLSearchParams({ message: msg, model_id: S.modelId, use_rag: S.useRag, web_search: S.useWeb, plan_mode: S.planMode, tools_json: JSON.stringify(toolOptions), skill_ids: (S.selectedSkillIds||[]).join(','), token: S.token });
      if (S.activeSession) params.append('session_id', S.activeSession);
      if (imgData) params.append('image_url', imgData);
      const es = new EventSource(`${API}/chat/stream?${params}`);
      let started = false;
      const timeout = setTimeout(() => { if (!started) { es.close(); resolve(false); } }, 6000);
      es.onmessage = e => {
        let d; try { d = JSON.parse(e.data); } catch { return; }
        if (d.type === 'start') { clearTimeout(timeout); started = true; if (d.model_id) { S.modelId = d.model_id; updateModelPill(); } if (d.session_id) { S.activeSession = d.session_id; loadContextStatus(); } resolve(true); }
        if (d.type === 'thinking_content') _onThinking(d.content);
        if (['tool_start','tool_progress','tool_result','tool_error','skill_loaded','model_switch'].includes(d.type)) _onToolEvent(d);
        if (d.type === 'delta') _onDelta(d.content);
        if (d.type === 'done') { es.close(); _onDone(d); }
        if (d.type === 'error') { es.close(); _onError(d.message); }
      };
      es.onerror = () => { clearTimeout(timeout); es.close(); if (!started) resolve(false); else _onError('Connection lost'); };
    });
  }

  async function _tryPostStream() {
    try {
      const body = { message: msg, model_id: S.modelId, use_rag: S.useRag, web_search: S.useWeb, plan_mode: S.planMode, tools: selectedToolOptions(), skill_ids: S.selectedSkillIds||[], session_id: S.activeSession||undefined, image_url: imgData||undefined };
      const resp = await apiFetch(`${API}/chat/stream`, { method:'POST', headers:{ 'Authorization':'Bearer '+S.token, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
      if (!resp.ok) { const e = await resp.json().catch(() => ({ detail: resp.statusText })); _onError(errText(e.detail || e.message || e || 'POST failed')); return; }
      const reader = resp.body.getReader(), dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { value, done } = await reader.read(); if (done) break;
        buf += dec.decode(value, { stream:true });
        const lines = buf.split('\n'); buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let d; try { d = JSON.parse(line.slice(6)); } catch { continue; }
          if (d.type === 'start') { if (d.model_id) { S.modelId = d.model_id; updateModelPill(); } if (d.session_id) { S.activeSession = d.session_id; loadContextStatus(); } }
          if (d.type === 'thinking_content') _onThinking(d.content);
          if (['tool_start','tool_progress','tool_result','tool_error','skill_loaded','model_switch'].includes(d.type)) _onToolEvent(d);
          if (d.type === 'delta') _onDelta(d.content);
          if (d.type === 'done') _onDone(d);
          if (d.type === 'error') _onError(d.message);
        }
      }
    } catch(err) { _onError(err.message); }
  }

  try {
    const preferPost = msg.length > 1800 || !!imgData;
    const esWorked = preferPost ? false : await _tryEventSource();
    if (!esWorked) await _tryPostStream();
  } catch(err) { _onError(err.message); }
}

function chatKey(e) {
  // Slash palette nav
  const pal = document.getElementById('slash-palette');
  if (pal && pal.style.display !== 'none') {
    const items = pal.querySelectorAll('.slash-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); _slashPaletteIdx = Math.min(_slashPaletteIdx+1, items.length-1); items.forEach((x,i) => x.classList.toggle('active', i===_slashPaletteIdx)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); _slashPaletteIdx = Math.max(_slashPaletteIdx-1, 0); items.forEach((x,i) => x.classList.toggle('active', i===_slashPaletteIdx)); return; }
    if (e.key === 'Tab' || e.key === 'Enter') { e.preventDefault(); const active = pal.querySelector('.slash-item.active'); if (active) selectSlash(active.dataset.cmd); return; }
    if (e.key === 'Escape') { pal.style.display = 'none'; return; }
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitChat(); }
}
// Paste image from clipboard into the chat composer
document.addEventListener('paste', e => {
  if (document.activeElement?.id !== 'chat-input' && !document.getElementById('composer-box')?.contains(document.activeElement)) return;
  const items = e.clipboardData?.items || [];
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile(); if (!file) continue;
      if (file.size > 20*1024*1024) { toast('Pasted image too large (max 20 MB)', 'err'); return; }
      const r = new FileReader();
      r.onload = ev => {
        S.pendingImage = ev.target.result;

        if (bar && thumb) { thumb.src = S.pendingImage; bar.style.display = 'block'; }
        toast('Image pasted — hit Send to include it', 'info');
      };
      r.readAsDataURL(file);
      return;
    }
  }
});

// ── Voice ──
async function toggleVoice() {
  if (!S.recording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      S.audioChunks = [];
      S.mediaRec = new MediaRecorder(stream, { mimeType:'audio/webm;codecs=opus' });
      S.mediaRec.ondataavailable = e => S.audioChunks.push(e.data);
      S.mediaRec.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(S.audioChunks, { type:'audio/webm' });
        const fd = new FormData(); fd.append('file', blob, 'voice.webm');
        toast('Transcribing…','info');
        try {
          const d = await req('POST', '/voice/transcribe', fd, true);
          const inp = document.getElementById('chat-input');
          if (inp) { inp.value = d.transcript; autoResize(inp); inp.focus(); }
          toast('Transcript ready','ok');
        } catch(e) { toast('STT: '+e.message,'err'); }
      };
      S.mediaRec.start(); S.recording = true;
      document.getElementById('voice-btn').classList.add('recording');
    } catch(e) { toast('Mic access denied','err'); }
  } else {
    S.mediaRec.stop(); S.recording = false;
    document.getElementById('voice-btn').classList.remove('recording');
  }
}

// ── OAuth state polling ──────────────────────────────────────────────────────
let _oauthPollTimer = null;
let _oauthPollConnId = null;

function _clearOAuthPoll() {
  if (_oauthPollTimer) { clearInterval(_oauthPollTimer); _oauthPollTimer = null; }
  _oauthPollConnId = null;
}

async function _pollOAuthComplete(connId, stateKey) {
  // Poll backend every 2s to check if OAuth callback completed
  let attempts = 0;
  _oauthPollConnId = connId;
  _oauthPollTimer = setInterval(async () => {
    attempts++;
    if (attempts > 60) { // 2 min timeout
      _clearOAuthPoll();
      toast('OAuth timed out. Try again.', 'err');
      return;
    }
    try {
      const d = await get(`/connectors/oauth/${connId}/status?state=${stateKey}`);
      if (d && d.connected) {
        _clearOAuthPoll();
        closeModal();
        toast(`✅ ${CONNECTOR_BY_ID[connId]?.name || connId} connected!`, 'ok');
        await loadConnectedApps();
        renderConnectorGrid(_activeConnCat, _connSearch);
        renderConnQuickBar();
      }
    } catch(e) { /* keep polling */ }
  }, 2000);
}

async function startOAuthFlow(connId) {
  const def = CONNECTOR_BY_ID[connId]; if (!def) return;
  // Generate a state key so we can poll completion
  const stateKey = Math.random().toString(36).slice(2) + Date.now().toString(36);
  // Show waiting modal
  openModal(`<div class="modal">
    <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:4px">${renderConnectorIcon(def, 18, 'modal-title-icon')} Connecting ${def.name}…</div>
    <div style="font-size:13px;color:#9090b0;margin-bottom:18px">A new window was opened. Please authorize JAZZ in that window, then return here.</div>
    <div id="oauth-status-msg" style="display:flex;align-items:center;gap:10px;padding:12px;background:#0a0a16;border:1px solid #1a1a30;border-radius:8px;margin-bottom:16px">
      <div style="width:10px;height:10px;border-radius:50%;background:#fbbf24;animation:pulse 1.2s infinite"></div>
      <span style="font-size:13px;color:#fbbf24">Waiting for authorization…</span>
    </div>
    <div style="font-size:12px;color:#4a4a6a;margin-bottom:16px">
      If the window didn't open, <a href="${API}/connectors/oauth/${connId}/init?state=${stateKey}&token=${encodeURIComponent(S.token)}" target="_blank" style="color:#7c6ff7">click here to open it manually</a>.
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:11px;color:#4a4a6a;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Or paste access token manually</label>
      <input class="input" id="oauth-manual-token-${connId}" placeholder="ya29… or xoxb-…">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="_clearOAuthPoll();closeModal()">Cancel</button>
      <button class="btn btn-ghost" onclick="saveOAuthToken('${connId}')">Save Token Manually</button>
    </div>
  </div>`);
  // Open the backend OAuth init URL — it builds proper URL with all required params
  const initUrl = `${API}/connectors/oauth/${connId}/init?state=${stateKey}&token=${encodeURIComponent(S.token)}`;
  const popup = window.open(initUrl, '_blank', 'width=600,height=700,noopener');
  if (!popup) toast('Pop-up blocked — use the manual link below', 'warn');
  // Start polling for completion
  _pollOAuthComplete(connId, stateKey);
}

async function saveOAuthToken(connId) {
  _clearOAuthPoll();
  const def = CONNECTOR_BY_ID[connId];
  const tok = (document.getElementById('oauth-manual-token-'+connId) || document.getElementById('oauth-token-'+connId))?.value.trim();
  if (!tok) { toast('Please paste your access token first', 'err'); return; }
  const conn_data = { access_token: tok };
  const shopEl = document.getElementById('oauth-shop-'+connId);
  if (shopEl && shopEl.value) conn_data.shop = shopEl.value.trim();
  await _saveSmartConnector(connId, def.name, conn_data);
}
async function saveApiKeyConnector(connId) {
  const def = CONNECTOR_BY_ID[connId];
  const val = document.getElementById('apikey-field-'+connId)?.value.trim();
  if (!val) { toast('Please enter the API key', 'err'); return; }
  const conn_data = {};
  if (connId === 'zapier' || connId === 'make' || connId === 'n8n' || connId === 'webhook') conn_data.webhook_url = val;
  else if (connId === 'indeed') conn_data.publisher_id = val;
  else if (connId === 'stripe') conn_data.api_key = val;
  else conn_data.api_key = val;
  await _saveSmartConnector(connId, def.name, conn_data);
}
async function saveConfigConnector(connId) {
  const def = CONNECTOR_BY_ID[connId];
  const conn_data = {};
  document.querySelectorAll('.cfg-field').forEach(f => { conn_data[f.dataset.key] = f.value.trim(); });
  await _saveSmartConnector(connId, def.name, conn_data);
}
async function _saveSmartConnector(connId, appName, conn_data) {
  try {
    // Check if already exists (update) or create new
    const existing = S.connectedApps[connId];
    if (existing) {
      await put('/smart-connectors/' + existing.id, { conn_data, status:'active' });
    } else {
      await post('/smart-connectors', { app_name: appName, connector_type: connId, conn_data });
    }
    closeModal();
    toast(`✅ ${appName} connected!`, 'ok');
    await loadConnectedApps();
    renderConnectorGrid(_activeConnCat, _connSearch);
    renderConnQuickBar();
  } catch(e) { toast(e.message, 'err'); }
}

          <button class="btn btn-primary" onclick="runPlayground()">▶ Run Agent</button>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#9090b0;cursor:pointer">
            <input type="checkbox" id="pg-think" style="accent-color:#7c6ff7"> Thinking mode
          </label>

    </div>
  </div>`;

async function runPlayground() {
  const prompt = document.getElementById('pg-prompt').value.trim();
  const model = document.getElementById('pg-model').value;
  if (!prompt) return;
  const out = document.getElementById('pg-output');
  out.innerHTML = `<div class="card" style="font-size:13px"><div style="color:#9090b0;margin-bottom:8px;display:flex;align-items:center;gap:8px"><div style="display:flex;gap:3px"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div> Running agent…</div><div id="pg-steps"></div></div>`;
  const steps = document.getElementById('pg-steps');
  try {
    const resp = await apiFetch(API+'/agent/run/stream', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.token}, body: JSON.stringify({ prompt, model_id:model, tools:[], timeout_seconds:90 }) });
    const reader = resp.body.getReader(), dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += dec.decode(value); const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        try {
          const d = JSON.parse(line.slice(5));
          if (d.type==='thought') steps.insertAdjacentHTML('beforeend', `<div class="agent-step thought"><b>💭 Step ${d.step+1}</b><div style="color:#9090b0;margin-top:4px">${escHtml(d.thought)}</div><span style="color:#7c6ff7;font-size:11px;font-family:'DM Mono',monospace">→ ${d.action}</span></div>`);
          if (d.type==='tool_result') steps.insertAdjacentHTML('beforeend', `<div class="agent-step ${d.success?'result':''}"><b>🔧 ${d.tool}</b> <span class="badge ${d.success?'badge-ok':'badge-err'}">${d.success?'ok':'failed'}</span> <span style="color:#4a4a6a;font-size:11px">${d.latency_ms}ms</span>${d.output?`<div style="font-family:'DM Mono',monospace;font-size:11px;color:#9090b0;margin-top:4px;white-space:pre-wrap;max-height:80px;overflow-y:auto">${escHtml(String(d.output).slice(0,300))}</div>`:''}</div>`);
          if (d.type==='done') steps.insertAdjacentHTML('beforeend', `<div class="agent-step done"><b>✅ Done</b><div class="msg-ai" style="margin-top:8px">${renderMd(d.answer)}</div></div>`);
        } catch(e) {}
      }
    }
  } catch(e) { out.innerHTML = `<div class="badge badge-err">${escHtml(e.message)}</div>`; }
}

function openLivyNotebook(sessionId) {
  openModal(`<div class="modal" style="width:600px">
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px">🔥 Spark Notebook — Session #${sessionId}</div>
    <div style="margin-bottom:10px">
      <select class="input" style="width:auto;margin-bottom:8px" id="livy-kind">
        <option value="pyspark">PySpark</option><option value="spark">Scala Spark</option><option value="sql">Spark SQL</option>
      </select>
      <textarea class="input" id="livy-code" rows="5" style="font-family:'DM Mono',monospace;font-size:13px" placeholder="# PySpark code&#10;df = spark.range(10)&#10;df.show()"></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-primary" onclick="runLivyStatement(${sessionId})">▶ Execute</button>
    </div>
    <div id="livy-output" style="background:#0a0a14;border:1px solid #1a1a30;border-radius:8px;padding:12px;min-height:80px;font-family:'DM Mono',monospace;font-size:12px">
      <span style="color:#4a4a6a">Output will appear here…</span>
    </div>
    <button class="btn btn-ghost" style="width:100%;margin-top:12px;justify-content:center" onclick="closeModal()">Close</button>
  </div>`);
}
async function runLivyStatement(sessionId) {
  const code = document.getElementById('livy-code')?.value, kind = document.getElementById('livy-kind')?.value;
  const out = document.getElementById('livy-output');
  if (!code?.trim()) return;
  out.innerHTML = '<span style="color:#fbbf24">Submitting to Spark…</span>';
  try {
    const d = await post(`/livy/sessions/${sessionId}/statements`, { code, kind });
    // Poll for result
    let attempts = 0;
    const poll = async () => {
      const r = await get(`/livy/sessions/${sessionId}/statements/${d.statement_id}`);
      if (r.state === 'available') {
        const txt = r.text || r.error || JSON.stringify(r.output);
        out.innerHTML = `<div style="color:${r.error?'#f87171':'#34d399'};white-space:pre-wrap">${escHtml(txt.slice(0,2000))}</div>`;
      } else if (++attempts < 30) { setTimeout(poll, 1500); }
      else out.innerHTML = '<span style="color:#fbbf24">Still running… check back.</span>';
    };
    setTimeout(poll, 1000);
  } catch(e) { out.innerHTML = `<span style="color:#f87171">${escHtml(e.message)}</span>`; }
}

      <div class="msg-ai" style="font-size:13px;line-height:1.55;overflow:auto">${renderMd(r.response || r.content || r.error || '')}</div>

}
async function runMultiModelChat() {
  const prompt = document.getElementById('mm-prompt')?.value.trim() || '';
  const models = (document.getElementById('mm-models')?.value || '').split(',').map(s => s.trim()).filter(Boolean);
  if (!prompt || models.length < 2) { toast('Prompt and at least 2 models required','err'); return; }
  const out = document.getElementById('mm-results');
  if (out) out.innerHTML = '<div style="grid-column:1/-1;color:#9090b0">Running models...</div>';
  try {
    const d = await post('/chat/multi-model', { message:prompt, model_ids:models, use_rag:false, session_id:S.activeSession });
    if (out) out.innerHTML = renderMultiModelResults(d.responses || d.results || [], d.charged_messages || models.length);
    loadUsage();
  } catch(e) {
    if (out) out.innerHTML = `<div class="badge badge-err">${escHtml(e.message)}</div>`;
  }
}

// Admin helpers
let _adminConnectorSort = { key:'display_name', dir:'asc' };
function adminConnectorRequirementText(r) {
  const envDetail = r?.env_detail || {};
  const reqKeys = Object.keys(envDetail);
  return reqKeys.length
    ? reqKeys.map(k => `${k}:${envDetail[k] ? 'ok' : 'missing'}`).join(' · ')
    : 'none';
}
function adminConnectorSortValue(r, key) {
  if (key === 'display_name') return String(r.display_name || r.connector_type || '').toLowerCase();
  if (key === 'category') return String(r.category || 'General').toLowerCase();
  if (key === 'setup_status') {
    const setup = String(r.setup_status || '').toLowerCase();
    return setup === 'ready' ? 2 : setup === 'partial' ? 1 : 0;
  }
  if (key === 'is_enabled') return r.is_enabled ? 1 : 0;
  if (key === 'requirements') return adminConnectorRequirementText(r).toLowerCase();
  return '';
}
function adminSortedConnectorRows(rows) {
  const key = _adminConnectorSort.key || 'display_name';
  const dir = _adminConnectorSort.dir === 'desc' ? -1 : 1;
  return [...(rows || [])].sort((a, b) => {
    const av = adminConnectorSortValue(a, key);
    const bv = adminConnectorSortValue(b, key);
    let cmp = 0;
    if (typeof av === 'number' && typeof bv === 'number') cmp = av - bv;
    else cmp = String(av).localeCompare(String(bv), undefined, { numeric:true, sensitivity:'base' });
    if (!cmp && key !== 'display_name') {
      cmp = adminConnectorSortValue(a, 'display_name').localeCompare(adminConnectorSortValue(b, 'display_name'), undefined, { numeric:true, sensitivity:'base' });
    }
    return cmp * dir;
  });
}
function adminConnectorSortTh(label, key, align = 'left') {
  const active = _adminConnectorSort.key === key;
  const dir = active ? _adminConnectorSort.dir : 'asc';
  const arrow = dir === 'asc' ? '&darr;' : '&uarr;';
  const color = active ? '#7c6ff7' : '#4a4a6a';
  return `<th style="padding:0;text-align:${align};font-weight:700">
    <button type="button" onclick="adminSetConnectorSort('${key}')" title="Sort ${escAttr(label)}" style="width:100%;padding:8px;background:transparent;border:none;color:inherit;cursor:pointer;text-align:${align};font:inherit;text-transform:inherit;letter-spacing:inherit;display:inline-flex;align-items:center;gap:6px;justify-content:${align==='center'?'center':'flex-start'}">
      <span>${escHtml(label)}</span><span style="color:${color};font-size:11px;line-height:1">${arrow}</span>
    </button>
  </th>`;
}
function adminSetConnectorSort(key) {
  if (_adminConnectorSort.key === key) {
    _adminConnectorSort.dir = _adminConnectorSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    _adminConnectorSort = { key, dir:'asc' };
  }
  const target = document.getElementById('admin-connector-table');
  if (target) target.innerHTML = renderAdminConnectorTable(window._adminConnectorRows || []);
}
function renderAdminConnectorTable(rows) {
  const sortedRows = adminSortedConnectorRows(rows);
  return `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:720px">
    <thead><tr style="font-size:10px;color:#4a4a6a;border-bottom:1px solid #1a1a30;text-transform:uppercase;letter-spacing:.08em">
      ${adminConnectorSortTh('Connector', 'display_name')}
      ${adminConnectorSortTh('Category', 'category')}
      ${adminConnectorSortTh('Setup', 'setup_status', 'center')}
      ${adminConnectorSortTh('Enabled', 'is_enabled', 'center')}
      ${adminConnectorSortTh('Requirements', 'requirements')}
    </tr></thead>
    <tbody>${sortedRows.map(r => {
      const setup = (r.setup_status || '').toLowerCase();
      const setupBadge = setup === 'ready'
        ? '<span class="badge badge-ok">ready</span>'
        : setup === 'partial'
          ? '<span class="badge badge-warn">partial</span>'
          : '<span class="badge badge-err">not configured</span>';
      const reqText = adminConnectorRequirementText(r);
      return `<tr style="border-bottom:1px solid #0d0d1a;font-size:13px">
        <td style="padding:10px 8px;font-weight:500">${escHtml(r.display_name || r.connector_type)}</td>
        <td style="padding:10px 8px;color:#9090b0">${escHtml(r.category || 'General')}</td>
        <td style="padding:10px 8px;text-align:center">${setupBadge}</td>
        <td style="padding:10px 8px;text-align:center">
          <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer">
            <input type="checkbox" ${r.is_enabled ? 'checked' : ''} onchange="adminTogglePlatformConnector('${escAttr(r.connector_type)}', this.checked)" style="accent-color:#7c6ff7">
            <span style="font-size:12px;color:#9090b0">${r.is_enabled ? 'on' : 'off'}</span>
          </label>
        </td>
        <td style="padding:10px 8px;font-size:11px;color:#4a4a6a;font-family:'DM Mono',monospace">${escHtml(reqText)}</td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function fmtSize(b) { if (!b) return '0 B'; const u = ['B','KB','MB','GB']; let i = 0; while (b >= 1024 && i < 3) { b /= 1024; i++; } return b.toFixed(i?1:0) + ' ' + u[i]; }
function fmtDate(s) {
  if (!s) return '';
  try {
    const d = new Date(s), now = new Date(), diff = now - d;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
    return d.toLocaleDateString();
  } catch(e) { return s; }
}

document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); navigate('chat'); setTimeout(() => document.getElementById('chat-input')?.focus(), 100); }
  // Ctrl+/ — open slash palette in chat input
  if ((e.metaKey||e.ctrlKey) && e.key === '/') {
    e.preventDefault();
    navigate('chat');
    setTimeout(() => {
      const inp = document.getElementById('chat-input');
      if (!inp) return;
      inp.focus();
      if (!inp.value.startsWith('/')) { inp.value = '/'; autoResize(inp); checkSlash('/'); }
      else checkSlash(inp.value);
    }, 100);
  }
  if (e.key === 'Escape') { closeModal(); closeModelDropdown(); const pal = document.getElementById('slash-palette'); if (pal) pal.style.display = 'none'; }
});
document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.activeElement?.id === 'auth-password') doAuth(); });
